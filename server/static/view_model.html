<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="main.css">
    <title>TeamWheatProject</title>  
</head>
<body>
    <div class="header_container">
        <div class="header_logo"><a href="#" class="header_logo_link">TeamWheatProject</a></div>
        <div class="header_menu">
            <div class="header_menu_item"><a href="#" class="header_menu_item_link">Просмотр моделей</a></div>
            <div class="header_menu_item" class="auth_no"><a href="#" class="header_menu_item_link">Авторизоваться</a></div>
            <div class="header_menu_item" class="auth_no"><a href="#" class="header_menu_item_link">Зарегистрироваться</a></div>
             <div class="header_menu_item" class="auth_accept"><a href="#" class="header_menu_item_link">Профиль</a></div>
            <div class="header_menu_item" class="auth_accept"><a href="#" class="header_menu_item_link">Выйти</a></div>
        </div>
    </div>

    <div class="main_container">
        <div class="main_container_title">Модель</div>
        <div class="main_container_description_model">Описание модели</div>
        <div class="main_container_input_sector">
            <label for="file_input" class="file_input_class std_btn">Загрузить изображение</label>
            <button class="main_container_input_sector_send std_btn">Отправить для обработки</button>
            <div class="main_container_input_sector_send_inp_file"><input class="main_container_input_sector_send_input hide" id="file_input" type="file" accept="image/png, image/jpeg"></div>
        </div>
        <div class="main_container_text_file_name">Файл не выбран</div>

    </div>
    
    <div class="footer_container">
        <div class="footer_link"><a href="#" class="footer_link_item">Github of project</a></div>    
    </div>    

    <script src="main.js"></script>
</body>
</html>
